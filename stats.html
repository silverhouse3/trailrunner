<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#090b10">
<title>TrailRunner — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090b10; --bg2: #0d1117; --bg3: #141b27;
  --cyan: #3ecfff; --green: #00e676; --orange: #ffab00;
  --red: #ff3d57; --purple: #bb86fc;
  --text: #e0e6ed; --dim: #4a6785; --border: #1e3050;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 20px; }
h1 { font-family: 'Orbitron', sans-serif; color: var(--cyan); font-size: 28px; margin-bottom: 8px; }
.subtitle { color: var(--dim); font-size: 14px; margin-bottom: 24px; }
a { color: var(--cyan); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }
.card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.card-value { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; }
.card-label { font-size: 12px; color: var(--dim); margin-top: 4px; letter-spacing: .1em; }
.card-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
.card.cyan .card-value { color: var(--cyan); }
.card.green .card-value { color: var(--green); }
.card.orange .card-value { color: var(--orange); }
.card.red .card-value { color: var(--red); }
.card.purple .card-value { color: var(--purple); }

/* Charts */
.chart-section { margin-bottom: 32px; }
.chart-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
.chart-bar-row { display: flex; align-items: center; margin-bottom: 6px; }
.chart-bar-label { width: 80px; font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.chart-bar { height: 24px; border-radius: 4px; transition: width .5s ease; min-width: 2px; position: relative; }
.chart-bar-val { position: absolute; right: 8px; top: 3px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,.8); }
.chart-bar.outside .chart-bar-val { right: auto; left: calc(100% + 8px); color: var(--dim); }

/* Run history table */
.history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.history-table th { text-align: left; padding: 8px; color: var(--dim); border-bottom: 2px solid var(--border); font-size: 11px; letter-spacing: .1em; }
.history-table td { padding: 8px; border-bottom: 1px solid var(--border); }
.history-table tr:hover { background: rgba(62,207,255,.05); }

/* Personal records */
.pr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
.pr-card { background: linear-gradient(135deg, rgba(187,134,252,.1), rgba(62,207,255,.05)); border: 1px solid var(--purple); border-radius: 12px; padding: 16px; }
.pr-label { font-size: 11px; color: var(--purple); letter-spacing: .1em; margin-bottom: 4px; }
.pr-value { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
.pr-date { font-size: 10px; color: var(--dim); margin-top: 4px; }

/* Streak */
.streak-bar { display: flex; margin-bottom: 32px; }
.streak-day { width: 14.28%; text-align: center; padding: 8px 4px; }
.streak-dot { width: 20px; height: 20px; border-radius: 50%; margin: 0 auto 4px; border: 2px solid var(--border); }
.streak-dot.active { background: var(--green); border-color: var(--green); }
.streak-dot.today { border-color: var(--cyan); }
.streak-day-name { font-size: 9px; color: var(--dim); }

/* Heatmap */
.heatmap { margin-bottom: 32px; }
.heatmap-grid { display: grid; grid-template-columns: 30px repeat(7, 1fr); gap: 3px; }
.heatmap-cell { width: 100%; aspect-ratio: 1; border-radius: 3px; background: var(--bg3); border: 1px solid var(--border); }
.heatmap-cell.l1 { background: rgba(0,230,118,.15); border-color: rgba(0,230,118,.2); }
.heatmap-cell.l2 { background: rgba(0,230,118,.35); border-color: rgba(0,230,118,.4); }
.heatmap-cell.l3 { background: rgba(0,230,118,.55); border-color: rgba(0,230,118,.6); }
.heatmap-cell.l4 { background: rgba(0,230,118,.8); border-color: rgba(0,230,118,.9); }
.heatmap-cell.future { opacity: .3; }
.heatmap-week-label { font-size: 9px; color: var(--dim); display: flex; align-items: center; }
.heatmap-day-header { font-size: 9px; color: var(--dim); text-align: center; }
.heatmap-legend { display: flex; align-items: center; margin-top: 8px; font-size: 10px; color: var(--dim); }
.heatmap-legend-cell { width: 14px; height: 14px; border-radius: 2px; margin: 0 2px; }

/* Pace trend */
.pace-chart { position: relative; height: 120px; margin-bottom: 32px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.pace-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--purple); transform: translate(-50%, -50%); }
.pace-line { position: absolute; height: 2px; background: rgba(187,134,252,.3); transform-origin: left center; }
.pace-label-y { position: absolute; left: -36px; font-size: 9px; color: var(--dim); font-family: 'JetBrains Mono', monospace; transform: translateY(-50%); }
.pace-label-x { position: absolute; bottom: -16px; font-size: 8px; color: var(--dim); transform: translateX(-50%); }

/* Synced badge */
.synced { color: var(--green); font-size: 10px; }
.not-synced { color: var(--dim); font-size: 10px; }

/* Back link */
.back-link { display: inline-block; margin-bottom: 16px; font-size: 14px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to TrailRunner</a>
<h1>YOUR STATS</h1>
<p class="subtitle" id="dateRange"></p>

<div class="summary-grid" id="summaryCards"></div>

<div class="chart-section">
  <div class="chart-title">PERSONAL RECORDS</div>
  <div class="pr-grid" id="prGrid"></div>
</div>

<div class="chart-section">
  <div class="chart-title">WEEKLY TRAINING LOAD</div>
  <div id="loadChart"></div>
  <div id="loadInsight" style="font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:8px;padding:0 4px"></div>
</div>

<div class="chart-section">
  <div class="chart-title">WEEKLY DISTANCE (km)</div>
  <div id="weeklyChart"></div>
</div>

<div class="chart-section">
  <div class="chart-title">THIS WEEK</div>
  <div class="streak-bar" id="streakBar"></div>
</div>

<div class="chart-section">
  <div class="chart-title">PACE TREND (min/km)</div>
  <div class="pace-chart" id="paceChart"></div>
</div>

<div class="chart-section">
  <div class="chart-title">HR ZONE DISTRIBUTION (ALL RUNS)</div>
  <div id="hrZoneChart"></div>
</div>

<div class="chart-section">
  <div class="chart-title">ACTIVITY HEATMAP (12 WEEKS)</div>
  <div class="heatmap" id="heatmap"></div>
</div>

<div class="chart-section">
  <div class="chart-title">RECENT RUNS</div>
  <table class="history-table" id="historyTable">
    <thead><tr>
      <th>DATE</th><th>DISTANCE</th><th>TIME</th><th>AVG SPEED</th><th>TOP SPEED</th><th>AVG HR</th><th>EFFORT</th><th>CALORIES</th><th>SYNC</th>
    </tr></thead>
    <tbody id="historyBody"></tbody>
  </table>
</div>

<script>
(function() {
  'use strict';

  // Read runs from localStorage (IndexedDB may have more, but this is always available)
  function getRuns() {
    try {
      var raw = localStorage.getItem('tr_runs');
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }

  function fmt(n, d) { return n != null ? n.toFixed(d || 0) : '—'; }
  function effortColor(s) { return s < 25 ? '#6b7280' : s < 75 ? '#22c55e' : s < 150 ? '#3ecfff' : s < 250 ? '#ffab00' : s < 400 ? '#f97316' : '#ff3d57'; }
  function fmtTime(s) {
    if (!s) return '—';
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = Math.floor(s % 60);
    if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function fmtShortDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  var runs = getRuns();

  // ── Summary cards ──
  var totalDist = 0, totalTime = 0, totalCals = 0, totalRuns = runs.length;
  var topSpeed = 0, maxIncline = 0, totalHR = 0, hrCount = 0, totalElevGain = 0;
  runs.forEach(function(r) {
    totalDist += r.distanceKm || 0;
    totalTime += r.elapsedSec || r.elapsed || 0;
    totalCals += r.calories || 0;
    var spd = r.maxSpeed || r.avgSpeed || 0;
    if (spd > topSpeed) topSpeed = spd;
    if (r.maxIncline > maxIncline) maxIncline = r.maxIncline;
    if (r.avgHR > 0) { totalHR += r.avgHR; hrCount++; }
    totalElevGain += r.elevGained || r.elevGain || 0;
  });

  var avgPace = totalDist > 0 ? totalTime / 60 / totalDist : 0; // min/km
  var avgHR = hrCount > 0 ? Math.round(totalHR / hrCount) : 0;

  var cards = [
    { value: totalRuns, label: 'TOTAL RUNS', cls: 'cyan' },
    { value: fmt(totalDist, 1), label: 'TOTAL DISTANCE', sub: 'km', cls: 'green' },
    { value: fmtTime(totalTime), label: 'TOTAL TIME', cls: 'orange' },
    { value: fmt(totalCals), label: 'TOTAL CALORIES', sub: 'kcal', cls: 'red' },
    { value: fmt(topSpeed, 1), label: 'TOP SPEED', sub: 'kph', cls: 'cyan' },
    { value: fmt(avgPace, 1), label: 'AVG PACE', sub: 'min/km', cls: 'purple' },
    { value: avgHR > 0 ? avgHR : '—', label: 'AVG HEART RATE', sub: avgHR > 0 ? 'bpm' : '', cls: 'red' },
    { value: fmt(totalElevGain), label: 'TOTAL ELEVATION', sub: 'm gained', cls: 'green' },
  ];

  var grid = document.getElementById('summaryCards');
  cards.forEach(function(c) {
    grid.innerHTML += '<div class="card ' + c.cls + '">' +
      '<div class="card-value">' + c.value + '</div>' +
      '<div class="card-label">' + c.label + '</div>' +
      (c.sub ? '<div class="card-sub">' + c.sub + '</div>' : '') +
      '</div>';
  });

  // ── Date range ──
  if (runs.length > 0) {
    var oldest = runs[runs.length - 1];
    var newest = runs[0];
    document.getElementById('dateRange').textContent =
      fmtDate(oldest.savedAt || oldest.date) + ' — ' + fmtDate(newest.savedAt || newest.date) +
      ' (' + totalRuns + ' runs)';
  } else {
    document.getElementById('dateRange').textContent = 'No runs recorded yet. Go run!';
  }

  // ── Personal records ──
  var prs = [];
  if (runs.length > 0) {
    // Top speed (max speed from any run)
    var fastestPeak = runs.reduce(function(best, r) {
      var s = r.maxSpeed || r.avgSpeed || 0;
      var bs = best.maxSpeed || best.avgSpeed || 0;
      return s > bs ? r : best;
    }, runs[0]);
    var peakSpd = fastestPeak.maxSpeed || fastestPeak.avgSpeed || 0;
    if (peakSpd > 0) {
      prs.push({ label: 'TOP SPEED', value: fmt(peakSpd, 1) + ' kph', date: fmtDate(fastestPeak.savedAt) });
    }

    // Fastest avg speed
    var fastest = runs.reduce(function(best, r) {
      return (r.avgSpeed || 0) > (best.avgSpeed || 0) ? r : best;
    }, runs[0]);
    prs.push({ label: 'FASTEST AVG SPEED', value: fmt(fastest.avgSpeed, 1) + ' kph', date: fmtDate(fastest.savedAt) });

    // Longest distance
    var longest = runs.reduce(function(best, r) {
      return (r.distanceKm || 0) > (best.distanceKm || 0) ? r : best;
    }, runs[0]);
    prs.push({ label: 'LONGEST RUN', value: fmt(longest.distanceKm, 2) + ' km', date: fmtDate(longest.savedAt) });

    // Longest time
    var longestTime = runs.reduce(function(best, r) {
      var t = r.elapsedSec || r.elapsed || 0;
      var bt = best.elapsedSec || best.elapsed || 0;
      return t > bt ? r : best;
    }, runs[0]);
    prs.push({ label: 'LONGEST TIME', value: fmtTime(longestTime.elapsedSec || longestTime.elapsed), date: fmtDate(longestTime.savedAt) });

    // Most calories
    var mostCals = runs.reduce(function(best, r) {
      return (r.calories || 0) > (best.calories || 0) ? r : best;
    }, runs[0]);
    prs.push({ label: 'MOST CALORIES', value: fmt(mostCals.calories) + ' kcal', date: fmtDate(mostCals.savedAt) });

    // Highest avg HR
    var highestHR = runs.reduce(function(best, r) {
      return (r.avgHR || 0) > (best.avgHR || 0) ? r : best;
    }, runs[0]);
    if ((highestHR.avgHR || 0) > 0) {
      prs.push({ label: 'HIGHEST AVG HR', value: fmt(highestHR.avgHR) + ' bpm', date: fmtDate(highestHR.savedAt) });
    }

    // Steepest incline
    var steepest = runs.reduce(function(best, r) {
      return (r.maxIncline || 0) > (best.maxIncline || 0) ? r : best;
    }, runs[0]);
    if (steepest.maxIncline > 0) {
      prs.push({ label: 'STEEPEST INCLINE', value: fmt(steepest.maxIncline, 1) + '%', date: fmtDate(steepest.savedAt) });
    }

    // Most elevation gain
    var mostElev = runs.reduce(function(best, r) {
      var e = r.elevGained || r.elevGain || 0;
      var be = best.elevGained || best.elevGain || 0;
      return e > be ? r : best;
    }, runs[0]);
    var elevVal = mostElev.elevGained || mostElev.elevGain || 0;
    if (elevVal > 0) {
      prs.push({ label: 'MOST ELEVATION', value: fmt(elevVal) + ' m', date: fmtDate(mostElev.savedAt) });
    }
  }

  var prGrid = document.getElementById('prGrid');
  prs.forEach(function(pr) {
    prGrid.innerHTML += '<div class="pr-card">' +
      '<div class="pr-label">' + pr.label + '</div>' +
      '<div class="pr-value">' + pr.value + '</div>' +
      '<div class="pr-date">' + pr.date + '</div></div>';
  });

  // ── Weekly training load chart ──
  var loadByWeek = {};
  runs.forEach(function(r) {
    var d = new Date(r.savedAt || r.date);
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    var weekStart = new Date(new Date(d).setDate(diff));
    var key = weekStart.toISOString().slice(0, 10);
    if (!loadByWeek[key]) loadByWeek[key] = 0;
    loadByWeek[key] += r.effortScore || 0;
  });

  var loadKeys = Object.keys(loadByWeek).sort().slice(-12);
  var maxLoad = Math.max.apply(null, loadKeys.map(function(k) { return loadByWeek[k]; }));
  if (maxLoad === 0) maxLoad = 1;

  function loadColor(v) {
    if (v < 100) return 'rgba(107,114,128,.6),rgba(107,114,128,.2)'; // Recovery (grey)
    if (v < 250) return 'rgba(0,230,118,.6),rgba(0,230,118,.2)';     // Moderate (green)
    if (v < 500) return 'rgba(255,171,0,.6),rgba(255,171,0,.2)';     // High (orange)
    return 'rgba(255,61,87,.6),rgba(255,61,87,.2)';                   // Very high (red)
  }
  function loadLabel(v) {
    if (v < 100) return 'Recovery';
    if (v < 250) return 'Moderate';
    if (v < 500) return 'High';
    return 'Very High';
  }

  var loadChartEl = document.getElementById('loadChart');
  loadKeys.forEach(function(k) {
    var load = loadByWeek[k];
    var pct = (load / maxLoad * 100).toFixed(0);
    var isSmall = pct < 15;
    loadChartEl.innerHTML += '<div class="chart-bar-row">' +
      '<div class="chart-bar-label">' + fmtShortDate(k) + '</div>' +
      '<div class="chart-bar' + (isSmall ? ' outside' : '') + '" style="width:' + Math.max(pct, 2) + '%;background:linear-gradient(90deg,' + loadColor(load) + ')">' +
      '<span class="chart-bar-val">' + Math.round(load) + '</span></div></div>';
  });

  // Training load insight
  var loadInsightEl = document.getElementById('loadInsight');
  if (loadKeys.length >= 2) {
    var thisWeekLoad = loadByWeek[loadKeys[loadKeys.length - 1]] || 0;
    var lastWeekLoad = loadByWeek[loadKeys[loadKeys.length - 2]] || 0;
    var avg4w = 0;
    var count4w = Math.min(4, loadKeys.length);
    for (var li = loadKeys.length - count4w; li < loadKeys.length; li++) avg4w += loadByWeek[loadKeys[li]] || 0;
    avg4w = avg4w / count4w;

    var trend = lastWeekLoad > 0 ? ((thisWeekLoad - lastWeekLoad) / lastWeekLoad * 100).toFixed(0) : 0;
    var trendStr = trend > 0 ? '+' + trend + '%' : trend + '%';
    var trendColor = trend > 20 ? 'var(--red)' : trend < -20 ? 'var(--cyan)' : 'var(--green)';

    loadInsightEl.innerHTML =
      'This week: <span style="color:' + trendColor + '">' + Math.round(thisWeekLoad) + ' (' + loadLabel(thisWeekLoad) + ', ' + trendStr + ' vs last week)</span>' +
      ' · 4-week avg: ' + Math.round(avg4w);
  }

  // ── Weekly distance chart ──
  var weeks = {};
  runs.forEach(function(r) {
    var d = new Date(r.savedAt || r.date);
    // Week start (Monday)
    var day = d.getDay(); // 0=Sun
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    var weekStart = new Date(d.setDate(diff));
    var key = weekStart.toISOString().slice(0, 10);
    if (!weeks[key]) weeks[key] = 0;
    weeks[key] += r.distanceKm || 0;
  });

  var weekKeys = Object.keys(weeks).sort().slice(-12); // last 12 weeks
  var maxWeekDist = Math.max.apply(null, weekKeys.map(function(k) { return weeks[k]; }));
  if (maxWeekDist === 0) maxWeekDist = 1;

  var chartEl = document.getElementById('weeklyChart');
  weekKeys.forEach(function(k) {
    var dist = weeks[k];
    var pct = (dist / maxWeekDist * 100).toFixed(0);
    var isSmall = pct < 15;
    chartEl.innerHTML += '<div class="chart-bar-row">' +
      '<div class="chart-bar-label">' + fmtShortDate(k) + '</div>' +
      '<div class="chart-bar' + (isSmall ? ' outside' : '') + '" style="width:' + Math.max(pct, 2) + '%;background:linear-gradient(90deg,rgba(62,207,255,.6),rgba(62,207,255,.2))">' +
      '<span class="chart-bar-val">' + dist.toFixed(1) + '</span></div></div>';
  });

  // ── This week streak ──
  var dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  var today = new Date();
  var todayDay = today.getDay(); // 0=Sun
  var mondayOffset = todayDay === 0 ? -6 : 1 - todayDay;
  var monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  monday.setHours(0, 0, 0, 0);

  var runDays = {};
  runs.forEach(function(r) {
    var d = new Date(r.savedAt || r.date);
    runDays[d.toISOString().slice(0, 10)] = true;
  });

  var streakEl = document.getElementById('streakBar');
  for (var i = 0; i < 7; i++) {
    var d = new Date(monday);
    d.setDate(monday.getDate() + i);
    var key = d.toISOString().slice(0, 10);
    var isToday = key === today.toISOString().slice(0, 10);
    var ran = runDays[key];
    streakEl.innerHTML += '<div class="streak-day">' +
      '<div class="streak-dot' + (ran ? ' active' : '') + (isToday ? ' today' : '') + '"></div>' +
      '<div class="streak-day-name">' + dayNames[i] + '</div></div>';
  }

  // ── Pace trend chart ──
  var paceEl = document.getElementById('paceChart');
  var paceRuns = runs.filter(function(r) {
    return (r.distanceKm || 0) > 0.5 && (r.elapsedSec || r.elapsed || 0) > 60;
  }).slice(0, 20).reverse(); // oldest first, max 20

  if (paceRuns.length >= 2) {
    var paces = paceRuns.map(function(r) {
      var t = r.elapsedSec || r.elapsed || 0;
      return t / 60 / r.distanceKm; // min/km
    });
    var minPace = Math.min.apply(null, paces);
    var maxPace = Math.max.apply(null, paces);
    var range = maxPace - minPace;
    if (range < 0.5) { minPace -= 0.25; maxPace += 0.25; range = maxPace - minPace; }
    var padTop = 10, padBot = 20, padLeft = 40;
    var chartH = 120;

    // Y-axis labels (lower pace = faster = higher on chart)
    for (var yi = 0; yi <= 4; yi++) {
      var paceVal = maxPace - (range * yi / 4);
      var yPos = padTop + ((chartH - padTop - padBot) * (1 - yi / 4));
      paceEl.innerHTML += '<span class="pace-label-y" style="top:' + yPos + 'px">' + paceVal.toFixed(1) + '</span>';
    }

    // Plot dots and lines
    for (var pi = 0; pi < paces.length; pi++) {
      var x = padLeft + ((pi / (paces.length - 1)) * (100 - padLeft - 5));
      var yPct = (maxPace - paces[pi]) / range; // 0=slowest (bottom), 1=fastest (top)
      var y = padTop + ((chartH - padTop - padBot) * (1 - yPct));

      paceEl.innerHTML += '<div class="pace-dot" style="left:' + x + '%;top:' + y + 'px" title="' +
        paces[pi].toFixed(1) + ' min/km"></div>';

      // Date label (every 5th point or first/last)
      if (pi === 0 || pi === paces.length - 1 || pi % 5 === 0) {
        paceEl.innerHTML += '<span class="pace-label-x" style="left:' + x + '%">' +
          fmtShortDate(paceRuns[pi].savedAt || paceRuns[pi].date) + '</span>';
      }
    }
  } else {
    paceEl.innerHTML = '<div style="color:var(--dim);text-align:center;padding:40px">Need 2+ runs to show pace trend</div>';
    paceEl.style.height = 'auto';
    paceEl.style.border = 'none';
  }

  // ── HR Zone Distribution ──
  var hrZoneEl = document.getElementById('hrZoneChart');
  var zoneTotal = { z1: 0, z2: 0, z3: 0, z4: 0, z5: 0 };
  var hasZoneData = false;
  runs.forEach(function(r) {
    if (r.hrZoneMinutes) {
      hasZoneData = true;
      zoneTotal.z1 += (r.hrZoneMinutes.z1 || 0);
      zoneTotal.z2 += (r.hrZoneMinutes.z2 || 0);
      zoneTotal.z3 += (r.hrZoneMinutes.z3 || 0);
      zoneTotal.z4 += (r.hrZoneMinutes.z4 || 0);
      zoneTotal.z5 += (r.hrZoneMinutes.z5 || 0);
    }
  });
  if (hasZoneData) {
    var zoneNames = ['Z1 Warm-up', 'Z2 Fat Burn', 'Z3 Aerobic', 'Z4 Threshold', 'Z5 Max'];
    var zoneColors = ['#6b7280', '#22c55e', '#fbbf24', '#f97316', '#ef4444'];
    var zoneKeys = ['z1', 'z2', 'z3', 'z4', 'z5'];
    var maxZone = Math.max(zoneTotal.z1, zoneTotal.z2, zoneTotal.z3, zoneTotal.z4, zoneTotal.z5, 1);
    var zoneHtml = '';
    for (var zi = 0; zi < 5; zi++) {
      var mins = Math.round(zoneTotal[zoneKeys[zi]]);
      var pct = (mins / maxZone * 100).toFixed(0);
      var isSmall = pct < 15;
      zoneHtml += '<div class="chart-bar-row">' +
        '<div class="chart-bar-label">' + zoneNames[zi] + '</div>' +
        '<div class="chart-bar' + (isSmall ? ' outside' : '') + '" style="width:' + Math.max(2, pct) + '%;background:' + zoneColors[zi] + '">' +
        '<span class="chart-bar-val">' + mins + ' min</span></div></div>';
    }
    hrZoneEl.innerHTML = zoneHtml;
  } else {
    hrZoneEl.innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px">No HR zone data yet — connect a heart rate monitor</div>';
  }

  // ── Activity heatmap (12 weeks) ──
  var heatmapEl = document.getElementById('heatmap');
  var now = new Date();
  // Find the Monday 12 weeks ago
  var hmDay = now.getDay();
  var hmMondayOffset = hmDay === 0 ? -6 : 1 - hmDay;
  var thisMonday = new Date(now);
  thisMonday.setDate(now.getDate() + hmMondayOffset);
  thisMonday.setHours(0, 0, 0, 0);
  var startMonday = new Date(thisMonday);
  startMonday.setDate(thisMonday.getDate() - 11 * 7); // 12 weeks back

  // Build run counts per day
  var runCountByDay = {};
  runs.forEach(function(r) {
    var d = new Date(r.savedAt || r.date);
    var key = d.toISOString().slice(0, 10);
    runCountByDay[key] = (runCountByDay[key] || 0) + 1;
  });

  var hmHtml = '<div class="heatmap-grid">';
  // Day headers
  hmHtml += '<div></div>';
  var hmDayNames = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
  for (var di = 0; di < 7; di++) {
    hmHtml += '<div class="heatmap-day-header">' + hmDayNames[di] + '</div>';
  }

  // Weeks
  var todayStr = now.toISOString().slice(0, 10);
  for (var wi = 0; wi < 12; wi++) {
    var weekStart = new Date(startMonday);
    weekStart.setDate(startMonday.getDate() + wi * 7);
    hmHtml += '<div class="heatmap-week-label">' + fmtShortDate(weekStart.toISOString()) + '</div>';

    for (var di = 0; di < 7; di++) {
      var cellDate = new Date(weekStart);
      cellDate.setDate(weekStart.getDate() + di);
      var cellKey = cellDate.toISOString().slice(0, 10);
      var count = runCountByDay[cellKey] || 0;
      var lvl = count === 0 ? '' : count === 1 ? ' l1' : count === 2 ? ' l2' : count === 3 ? ' l3' : ' l4';
      var isFuture = cellKey > todayStr ? ' future' : '';
      hmHtml += '<div class="heatmap-cell' + lvl + isFuture + '" title="' + cellKey + ': ' + count + ' run' + (count !== 1 ? 's' : '') + '"></div>';
    }
  }
  hmHtml += '</div>';
  hmHtml += '<div class="heatmap-legend">Less ';
  hmHtml += '<div class="heatmap-legend-cell" style="background:var(--bg3);border:1px solid var(--border)"></div>';
  hmHtml += '<div class="heatmap-legend-cell" style="background:rgba(0,230,118,.15)"></div>';
  hmHtml += '<div class="heatmap-legend-cell" style="background:rgba(0,230,118,.35)"></div>';
  hmHtml += '<div class="heatmap-legend-cell" style="background:rgba(0,230,118,.55)"></div>';
  hmHtml += '<div class="heatmap-legend-cell" style="background:rgba(0,230,118,.8)"></div>';
  hmHtml += ' More</div>';
  heatmapEl.innerHTML = hmHtml;

  // ── History table ──
  var tbody = document.getElementById('historyBody');
  runs.slice(0, 30).forEach(function(r) {
    var elapsed = r.elapsedSec || r.elapsed || 0;
    var ms = r.maxSpeed || 0;
    var hr = r.avgHR || 0;
    var synced = r.synced && r.synced.strava;
    tbody.innerHTML += '<tr>' +
      '<td>' + fmtDate(r.savedAt || r.date) + '</td>' +
      '<td>' + fmt(r.distanceKm, 2) + ' km</td>' +
      '<td>' + fmtTime(elapsed) + '</td>' +
      '<td>' + fmt(r.avgSpeed, 1) + '</td>' +
      '<td>' + (ms > 0 ? fmt(ms, 1) : '—') + '</td>' +
      '<td>' + (hr > 0 ? fmt(hr) : '—') + '</td>' +
      '<td>' + (r.effortScore > 0 ? '<span style="color:' + effortColor(r.effortScore) + '">' + r.effortScore + '</span>' : '—') + '</td>' +
      '<td>' + fmt(r.calories) + '</td>' +
      '<td>' + (synced ? '<span class="synced">Strava</span>' : '<span class="not-synced">—</span>') + '</td></tr>';
  });

  if (runs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--dim);padding:32px">No runs recorded yet. Complete a workout to see your stats here.</td></tr>';
  }
})();
</script>
</body>
</html>
